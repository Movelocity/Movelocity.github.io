<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fantacy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <meta name="description" content="The deep dark fantacy">
    <meta name="theme-color" content="#4D698E">
    <style>
        *{
            /* initialize */
            margin: 0;
            padding: 0;
        }
        body{
            /* full window height*/
            height: 100vh;
            /* flex layout, horizontal,vertical-centered */
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(200deg,#f3e7e9,#e3eeff);
        }
        .container{
            background-color: #fff;
            width: 650px;
            height: 415px;
            border-radius: 5px;
            box-shadow: 5px 5px 5px rgba(0,0,0,.1);
            position: relative;
        }
        .form-box {
            position: absolute;
            top: -10%;
            left: 5%;
            background-color: #d3b7d8;
            width: 320px;
            height: 500px;
            border-radius: 5px;
            box-shadow: 2px 0 10px rgba(0,0,0,.1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: .5s ease-in-out;
        }

        .register-box, .login-box{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .hidden{
            display: none;
            transition: .5s;
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 5px;
        }
        
        input{
            background-color: transparent;
            width: 70%;
            color: #fff;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,.4);
            padding: 10px 0;
            text-indent: 10px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        input::placeholder{
            color: #fff;
        }

        input:focus{
            color: #a262ad;
            outline: none;
            border-bottom: 1px solid #a262ad80;
            transition: .5s;
        }

        input:focus::placeholder{
            opacity: 0;
        }

        .form-box button{
            width: 70%;
            margin-top: 35px;
            background-color: #f6f6f6;
            outline: none;
            padding: 13px;
            color: #a262ad;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
        }

        .form-box button:hover{
            background-color: #a262ad;
            color: #f6f6f6;
            transition: background-color .5s ease;
        }

        .con-box{
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .con-box.left{
            left: -2%;
        }

        .con-box.right{
            right: -2%;
        }

        .con-box h2{
            color: #8e9aaf;
            font-size: 25px;
            font-weight: bold;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 4px;
        }

        .con-box p{
            font-size: 12px;
            letter-spacing: 2px;
            color: #8e9aaf;
            text-align: center;
        }

        .con-box span{
            color: #d3b7d8;
        }

        .con-box img{
            width: 150px;
            height: 150px;
            opacity: 0.9;
            margin: 40px 0;
        }

        .con-box button{
            margin-top: 3%;
            background-color: #fff;
            color: #a262ad;
            border: 1px solid #d3b7d8;
            padding: 6px 10px;
            border-radius: 5px;
            letter-spacing: 1px;
            outline: none;
            cursor: pointer;
        }

        .con-box button:hover{
            background-color: #d3b7d8;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <!-- Register -->
            <div class="register-box">
                <h1>register</h1>
                <input type="text" placeholder="user-name" />
                <input type="email" placeholder="email" />
                <input type="password" placeholder="password" />
                <input type="password" placeholder="password*" />
                <button>register</button>
            </div>
            <!-- Login -->
            <div class="login-box hidden">
                <h1>login</h1>
                <input type="text" placeholder="user-name" />
                <input type="password" placeholder="password" />
                <button>login</button>
            </div>
        </div>
        <div class="con-box left">
            <h2>Hi, I am <span>Rosta</span></h2>
            <p>do you like to see <span>sakura</span></p>
            <img src="./wf4_1.png" alt="" />
            <p>with me by your side?</p>
            <button id="login">Maybe later</button>
        </div>
        <div class="con-box right">
            <h2>Hello,this is <span>Botise</span></h2>
            <p>I don't want to be <span>horny</span> anymore</p>
            <img src="./wf7_2.png" alt="" />
            <p>I just want to be happy</p>
            <button id="register">Leave</button>
        </div>
    </div>
    <script>
        let login = document.getElementById('login');
        let register = document.getElementById('register');
        let form_box = document.getElementsByClassName('form-box')[0];
        let register_box = document.getElementsByClassName('register-box')[0];
        let login_box = document.getElementsByClassName('login-box')[0];

        register.addEventListener('click', () => {
            form_box.style.transform = 'translateX(80%)';
            login_box.classList.add('hidden');
            register_box.classList.remove('hidden');
        });
        login.addEventListener('click', () => {
            form_box.style.transform = 'translateX(0%)';
            register_box.classList.add('hidden');
            login_box.classList.remove('hidden');
        });
    </script>
</body>
</html>
