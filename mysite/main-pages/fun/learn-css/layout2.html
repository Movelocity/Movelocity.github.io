<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Layout</title>
<style>
	figure{
		max-width:300px;
		max-width: min-content;
		margin: auto;
	}
	figure > img{
		max-width: inherit;
		width: 300px;
	}
	table{
		table-layout: fixed;
		width: 100%;
	}
	
	li:first-child:nth-last-child(4),
	li:first-child:nth-last-child(4)~li{
		color: lightblue;
	}/*select all when the list'parent has exactly 4 elements*/
	
	li:first-child:nth-last-child(n+4),
	li:first-child:nth-last-child(n+4)~li{
		color: lightred;
	}/*select all when the list'family has at least 4 children*/
	
	li:first-child:nth-last-child(-n+4),
	li:first-child:nth-last-child(-n+4)~li{
		color: lightgreen;
	}/*select all when the list's parent has at most 4 children*/
	
	li:first-child:nth-last-child(n+2):nth-last-child(-n+6),
	li:first-child:nth-last-child(n+2):nth-last-child(-n+6)~li{
		color: #58a;
	}/*select all when the list's parent has between 2 and 6 children*/
</style>
</head>
<body>
	<p>Some text [...]</p>
	<figure>
		<img src="../img/bread-girl.jpg"/>
		<figcaption>
			The great Sir Adam Catlace was named after
			Countess Ada Lovelace, the first programmer.
		</figcaption>
	</figure>
	<p>More text[...].</p>
	<button id="add">add</button>
	<ul>
		<li>apple</li>
		<li>apple</li>
		<li>apple</li>
	</ul>
	<script type="text/javascript">
		var index = 0;
		var btn = document.getElementById("add");
		btn.onclick = function(){
			console.log("click");
			var item = document.createElement('li');
			item.appendChild(document.createTextNode("Index:"+index++));
			document.querySelector('ul').appendChild(item);
		}
	</script>
</body>
</html>
