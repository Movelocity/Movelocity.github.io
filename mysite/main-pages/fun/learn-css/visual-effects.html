<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visual Effects</title>
<style>
	div{
		margin: 1em;
		width: 200px; height:100px;
	}
	.one-side-shadow{
		background: yellow;
		box-shadow: 0 10px 7px -8px black; /* 
											x-offset, y-offset,
											模糊半径, 扩张半径, color
											*/
	}
	.two-sides-shadow{
		background: pink;
		box-shadow: 3px 3px 6px -3px black; 
	}
	.left-right-shadow{
		background: #655;
		box-shadow: 5px 0 5px -5px black,
					-5px 0 5px -5px black;
	}
	.svg-filter-shadow{
		background: #58a;
		background: linear-gradient(135deg, transparent 15px, #58a 0) top left,
				linear-gradient(-135deg, transparent 15px, #58a 0) top right,
				linear-gradient(-45deg, transparent 15px, #58a 0) bottom right,
				linear-gradient(45deg, transparent 15px, #58a 0) bottom left;
		background-size: 50% 50%;
		background-repeat: no-repeat;
		
		filter: url(drop-shadow.svg#drop-shadow);
		filter: drop-shadow(2px 2px 5px rgba(0,0,0,.5)); 
	}
	.color-tint-filter{
		width: 100%; height: 100%;
		transition: .5s filter;
		filter: sepia(1) saturate(4) hue-rotate(295deg);
	}
	.color-tint-filter:hover,.color-tint-filter:focus{
		filter: none;
	}
	.tinted-image{
		width: 200px; height: 100px;
		background-size: cover;
		background-color: hsl(335, 100%, 50%);
		background-blend-mode: luminosity;
		transition: .5s background-color;
	}
	.tinted-image:hover{
		background-color: transparent;
	}
	body{
		min-height: 100vh;
		box-sizing: border-box;
		width:600px;height:300px;
		padding-top: calc(50vh - 6em);
		font: 150%/1.6 Baskerville, Palatino, serif;
	}
	.glass2{
		position: ralative;
		margin: 0 auto;
		padding: 1em;
		max-width: 23em;
		background: hsla(0, 0%, 100%, .25) border-box;
		overflow: hidden;
		border-radius: .3em;
		box-shadow: 0 0 0 1px hsla(0, 0%, 100%, .3) inset,
						0 .5em 1em rgba(0, 0, 0, .6);
		text-shadow: 0 1px 1px hsla(0, 0%, 100%, .3);
	}
	body,glass2:before{
		background: url("../img/pink.jpg") 0 / cover fixed;
	}
	.glass2::before{
		content: '';
		position: absolute;
		top: 0; right: 0; bottom: 0; left: 0;
		margin: -30px;
		z-index:-1;
		-webkit-filter: blur(20px);
		filter: blur(20px);
	}
	blockquote{
		font-style: italic;
	}
	blockquote cite{
		font-style: normal;
	}
	.folded-corner{
		background: #58a;
		background: linear-gradient(to left bottom, 
						transparent 50%, rgba(0,0,0,.4) 0)
						no-repeat 100% 0 / 2em 2em,
					linear-gradient(-135deg,
						transparent 1.4em, #58a 0);
	}
	.folded-corner2{
		background: #58a;
		background: linear-gradient(to left bottom, 
						transparent 50%, rgba(0,0,0,.4) 0) 
						no-repeat 100% 0 / 2.8em 1.63em,
					linear-gradient(-150deg,
						transparent 1.4em, #58a 0);
		/*???????how did it work? so many args*/
	}
	.note{
		position: relative;
		background: #58a;
		background: linear-gradient(-150deg, transparent 1.5em, #58a 0);
		border-radius: .5em;
	}
	.note::before{
		content: '';
		position: absolute;
		top: 0; right: 0;
		background: linear-gradient(to left bottom, 
						transparent 50%, rgba(0,0,0,.4) 0, rgba(0,0,0,.4)) 
						100% 0 no-repeat;
		width: 1.73em;
		height: 3em;
		transform-origin: bottom right;
		transform: translateY(-1.23em) rotate(-30deg);
		border-bottom-left-radius: inherit;
		box-shadow: -.2em .2em .3em -.1em rgba(0,0,0,.15);
	}
</style>
</head>
<body>
	<div class="one-side-shadow"></div>
	<div class="two-sides-shadow"></div>
	<div class="left-right-shadow"></div>
	<div class="svg-filter-shadow"></div>
	<div><img src="../img/sunset.jpg" class="color-tint-filter"></div>
	<div><p style="background:hsl(335, 100%, 50%);width:100%;height:100%;">
		<img src="../img/sunset.jpg" alt="Rawrrr!"
				style="mix-blend-mode: luminosity;width:100%;height:100%;"/>
	</p></div>
	<div class="tinted-image" 
		style="background-image:url(../img/sunset.jpg);">
	</div>
	<main class="glass2">
		<blockquote>
			"The only way to end a war is to[...]"
			<footer>-
				<cite>
					The end of the world,
					Drawn Picture
				</cite>
			</footer>
		</blockquote>
	</main>
	<div class="folded-corner">Text</div>
	<div class="folded-corner2">Text</div>
	<div class="note">Text</div>
</body>
</html>
