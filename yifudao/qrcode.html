<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style>
        body {
            font-size: medium;
            background-color: transparent;
        }

        .abs_top {
            position: fixed;
            display: flex;
            padding-top: 2.5em;
            top: 0;
            left:0;
            width: 100%;
            height: 2em;
            flex-direction: row;
            box-shadow: 0 5px 12px -8px #b0b3b5;
            background-color: #ffffff;
        }

        .abs_top>img{
            height:1.3em;
            margin: 0 .3em .3em .3em;
            max-width: 5%;
        }
        
        .bk_img{
            width: 98%;
            z-index: -1;
        }
        .container{
            position:fixed;
            margin-top:2em;
            position:fixed;
            height:100%;
            width:100%;
            z-index: -2;
        }
        .header{
            display: fixed;
            margin-left: .5em;
        }
        
        .title_time{
            top: 1em;
            width: 98%;
            text-align: center;
            position: absolute;
            color: #83c18b;
            font-size: 1.5em;
            z-index: 10;
        }
        
        .info_container{
            position: absolute;
            display: flex;
            width:65%;
            left: 31%;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-around;
        }
        .info_item{
            color: black;
            font-size: .8em;
            z-index: 10;
        }
        .horizontal-text {
            color: #8a9697;
            font-size: .9em;
        }
        .margin_btm_bit{
            margin-bottom:.5em
        }
        .xxsmall-text{
            font-size: xx-small;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="abs_top">
        <img src="./drawable/left_arrow.png" onclick="go_back()"/>
        <div class="header">
            出入校二维码
        </div>
    </div>
    <div class="container">
        <img class="bk_img" src="./drawable/qr_bg.png"/>
        <div class="title_time" id="title_time">2022-10-02 12:31:44</div>
        
        <div class="info_container" style="top:37.5%; height:4em">
            <div class="info_item">2022-10-02-10:41</div>
            <div class="info_item">2022-10-02-20:44</div>
        </div>
        <div class="info_container" style="top:47.5%; height:11em">
            <div class="info_item" id="stu_name">钟离</div>
            <div class="info_item">信息学院</div>
            <div class="info_item">2021级大数据管理与应用1班</div>
            <div class="info_item">（广州校区）陈晓华</div>
            <div class="info_item">13055637820</div>
        </div>
    </div> 
</div>
<script src="./moment.js"></script>
<script src="./my_util.js"></script>
<script type="text/javascript">
    var container = document.getElementById("list_container");
    var list_item = document.getElementById("list_item");

    
    var fullname = getFullName();
    document.getElementById("stu_name").innerHTML = fullname;
    
    var title_time = document.getElementById("title_time");
    
    setInterval(function(){
        title_time.innerHTML = moment().format('YYYY-MM-DD H:mm:ss');
        //console.log(moment().format('YYYY-MM-DD HH:MM:SS'));
    }, 1000);
    
    console.log(window.location.href);
    console.log(getQueryString('size'));
    console.log(getQueryString("name"));
</script>
</body>
